name: Deploy Cron Service
description: Builds cron image and deploys to Coolify

inputs:
  DOCKER_HUB_PAT:
    description: Docker Hub personal access token
    required: true
  COOLIFY_PAT:
    description: Coolify personal access token
    required: true
  COOLIFY_UUID:
    description: Coolify service UUID
    required: true
  TAG_PREFIX:
    description: Docker tag prefix (e.g., staging-, empty for prod)
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Build and push cron image
      shell: bash
      run: bun run .github/scripts/src/build-image --tagPrefix "${{ inputs.TAG_PREFIX }}" --dockerUpload --type cron --dockerFileName Dockerfile.scripts
      env:
        DOCKER_HUB_PAT: ${{ inputs.DOCKER_HUB_PAT }}
