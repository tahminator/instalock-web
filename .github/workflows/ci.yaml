# yaml-language-server: $schema=https://raw.githubusercontent.com/SchemaStore/schemastore/refs/heads/master/src/schemas/json/github-workflow.json
name: CI
run-name: Running continuous integration on ${{ github.actor }}'s commits

permissions:
  contents: read

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup pipeline
        uses: ./.github/composite/setup

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install Dependencies
        run: pnpm install -r --frozen-lockfile

      - name: Run Tests
        id: test-parallel
        continue-on-error: true
        run: pnpm run test:parallel

      - name: Re-run tests without parallel
        if: steps.test-parallel.outcome == 'failure'
        run: pnpm run test:then:fail

  buildCronImage:
    name: Build Cron Docker image and deploy to Docker Hub
    runs-on: ubuntu-latest
    needs: [test]

    outputs:
      tag: ${{ steps.build.outputs.tag }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup pipeline
        uses: ./.github/composite/setup
        with:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Build cron image
        uses: ./.github/composite/build-cron
        id: build
        with:
          ENVIRONMENT: ${{ github.event.pull_request && 'staging' || 'production' }}

  buildWebImage:
    name: Build Web Docker image and deploy to Docker Hub
    runs-on: ubuntu-latest
    needs: [test]

    outputs:
      tag: ${{ steps.build.outputs.tag }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup pipeline
        uses: ./.github/composite/setup
        with:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Build web image
        uses: ./.github/composite/build-web
        id: build
        with:
          ENVIRONMENT: ${{ github.event.pull_request && 'staging' || 'production' }}

  deployToStagingCron:
    name: Deploy Cron to Staging
    needs: [buildCronImage]
    runs-on: ubuntu-latest

    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Pipeline
        uses: ./.github/composite/setup
        with:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Deploy Cron Service
        uses: ./.github/composite/deploy-cron
        with:
          ENVIRONMENT: staging
          VERSION: ${{ needs.buildCronImage.outputs.tag }}

  deployToStagingWeb:
    name: Deploy Web to Staging
    needs: [buildWebImage]
    runs-on: ubuntu-latest

    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Pipeline
        uses: ./.github/composite/setup
        with:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Setup migration tooling
        uses: ./.github/composite/setup/migrate

      - name: Deploy Web Service
        uses: ./.github/composite/deploy-web
        with:
          ENVIRONMENT: staging
          VERSION: ${{ needs.buildWebImage.outputs.tag }}

  createTag:
    name: Create new tag
    runs-on: ubuntu-latest
    needs: [buildCronImage, buildWebImage]

    if: github.ref_name == 'main'

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup pipeline
        uses: ./.github/composite/setup
        with:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Create new tag
        uses: ./.github/composite/create-tag
